<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Chaos Cutter</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍕</text></svg>">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: sans-serif;
            text-align: center;
            background: #111;
            color: white;
            overflow-x: hidden;
        }
        #ui {
            padding: 10px 12px 6px;
            background: #222;
        }
        #ui h2 { margin: 0 0 8px; font-size: 1.15rem; }
        .row { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 6px; }
        input[type=number] {
            font-size: 1rem; padding: 5px 8px;
            border-radius: 4px; border: none; width: 60px;
        }
        button {
            font-size: 0.9rem; padding: 6px 12px;
            border-radius: 4px; border: none;
            color: white; cursor: pointer; font-weight: bold;
        }
        #btnGenerate  { background: #ff5722; }
        #btnGenerate:hover { background: #f44336; }
        #btnClear     { background: #555; }
        #btnClear:hover { background: #777; }
        #btnReset     { background: #333; }
        #btnReset:hover { background: #555; }

        /* Step guide */
        #steps {
            display: flex;
            justify-content: center;
            gap: 0;
            font-size: 0.72rem;
            color: #888;
            margin-bottom: 4px;
        }
        .step {
            padding: 3px 10px;
            border: 1px solid #444;
            border-right: none;
            background: #1a1a1a;
        }
        .step:last-child { border-right: 1px solid #444; border-radius: 0 3px 3px 0; }
        .step:first-child { border-radius: 3px 0 0 3px; }
        .step.active { background: #333; color: #fff; border-color: #666; }

        #status {
            font-size: 0.8rem; color: #bbb;
            padding: 5px 10px;
            background: #1a1a1a;
            border-top: 1px solid #333;
            min-height: 1.6em;
        }
        #wrap {
            position: relative;
            width: 100vw; max-width: 640px;
            margin: 0 auto;
        }
        video { width: 100%; display: block; }
        canvas {
            position: absolute; left: 0; top: 0;
            width: 100%; height: 100%;
            touch-action: none; cursor: crosshair;
        }
    </style>
</head>
<body>
<div id="ui">
    <h2>🍕 Pizza Chaos Cutter</h2>

    <div id="steps">
        <div class="step active" id="s1">① Tap centre</div>
        <div class="step" id="s2">② Tap edges</div>
        <div class="step" id="s3">③ Generate</div>
    </div>

    <div class="row">
        <label for="n">Slices:</label>
        <input id="n" type="number" value="7" min="2" max="20">
        <button id="btnGenerate" onclick="generate()">✂ Generate</button>
        <button id="btnClear"    onclick="clearAnchors()">Clear anchors</button>
        <button id="btnReset"    onclick="resetAll()">Reset</button>
    </div>

    <div id="status">Tap the centre of your object to begin</div>
</div>

<div id="wrap">
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
</div>

<script src="app.js"></script>
<script>
// Keep step indicators in sync with phase changes
const origSetStatus = window.setStatus;
function setStatus(m) {
    document.getElementById("status").textContent = m;
    const s1 = document.getElementById("s1");
    const s2 = document.getElementById("s2");
    const s3 = document.getElementById("s3");
    s1.classList.toggle("active", phase === "idle" || phase === "center");
    s2.classList.toggle("active", phase === "anchoring");
    s3.classList.toggle("active", phase === "sliced");
}
</script>
</body>
</html>

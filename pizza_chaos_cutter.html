<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Chaos Cutter</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍕</text></svg>">
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            text-align: center;
            background: #111;
            color: white;
            overflow-x: hidden;
        }
        #ui {
            padding: 12px 15px;
            background: #222;
        }
        #ui h2 { margin: 0 0 8px; font-size: 1.2rem; }
        input, button {
            font-size: 1rem;
            padding: 5px 10px;
            margin: 4px;
            border-radius: 4px;
            border: none;
        }
        button {
            background: #ff5722;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #f44336; }
        #status {
            font-size: 0.82rem;
            color: #bbb;
            padding: 5px 10px;
            background: #1a1a1a;
            border-top: 1px solid #333;
            min-height: 1.6em;
        }
        #wrap {
            position: relative;
            width: 100vw;
            max-width: 640px;
            margin: 0 auto;
        }
        video { width: 100%; display: block; }
        canvas {
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            touch-action: none;
            cursor: crosshair;
        }
    </style>
</head>
<body>
<div id="ui">
    <h2>🍕 Pizza Chaos Cutter</h2>
    <label for="n">Slices: </label>
    <input id="n" type="number" value="7" min="2" max="20">
    <button onclick="generate()">Generate Chaos</button>
    <div id="status">Starting camera…</div>
</div>
<div id="wrap">
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
</div>
<script src="app_auto.js"></script>
</body>
</html>

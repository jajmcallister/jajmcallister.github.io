<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Chaos Cutter</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            text-align: center;
            background: #111;
            color: white;
            overflow-x: hidden;
        }

        #ui {
            padding: 15px;
            background: #222;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        input, button {
            font-size: 1rem;
            padding: 5px 10px;
            border-radius: 4px;
            border: none;
        }

        button {
            background: #ff5722;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: #f44336; }

        #trackBtn {
            background: #2196f3;
        }
        #trackBtn:hover { background: #1976d2; }

        #wrap {
            position: relative;
            width: 100vw;
            max-width: 640px;
            margin: 0 auto;
        }

        video {
            width: 100%;
            display: block;
        }

        canvas {
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            touch-action: none;
        }
    </style>
</head>
<body>

<div id="ui">
    <h2 style="margin:0">🍕 Pizza Chaos Cutter</h2>
    <button id="trackBtn">🎯 Detect pizza</button>
    <label for="n">Slices:</label>
    <input id="n" type="number" value="7" min="2" max="20" style="width:52px">
    <button onclick="generate()">Generate Chaos</button>
</div>

<div id="wrap">
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
</div>

<script src="app_auto.js"></script>
</body>
</html>
